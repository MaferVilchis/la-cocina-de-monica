<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cocina de Mónica — Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rojo:    #C0392B;
  --rojo-dk: #96281B;
  --verde:   #1A6B3A;
  --amarillo:#F0C040;
  --crema:   #FDF6EC;
  --cafe:    #6D4C2A;
  --blanco:  #FFFDF9;
  --gris:    #7F8C8D;
  --texto:   #2C1A0B;
  --sombra:  rgba(44,26,11,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--crema); color: var(--texto); overflow-x: hidden; }

header {
  background: linear-gradient(135deg, var(--rojo-dk) 0%, var(--rojo) 60%, #D4541A 100%);
  padding: 2.5rem 1.5rem 2rem; text-align: center; position: relative; overflow: hidden;
}
header::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(255,255,255,0.04) 18px, rgba(255,255,255,0.04) 36px);
}
.flag-stripe { display: flex; justify-content: center; gap: 4px; margin-bottom: 1rem; position: relative; }
.flag-stripe span { width: 44px; height: 5px; border-radius: 3px; }
.header-inner { position: relative; max-width: 700px; margin: 0 auto; }
.header-badge { display: inline-block; background: var(--amarillo); color: var(--cafe); font-weight: 800; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 1rem; border-radius: 999px; margin-bottom: 0.8rem; }
header h1 { font-family: 'Lobster', cursive; font-size: clamp(2.8rem, 9vw, 5.5rem); color: #fff; line-height: 1; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); margin-bottom: 0.3rem; }
.header-tagline { color: rgba(255,255,255,0.85); font-size: 1rem; font-weight: 300; margin-bottom: 1.2rem; }
.header-chips { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
.chip { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }

.filter-bar { position: sticky; top: 0; z-index: 50; background: var(--blanco); border-bottom: 3px solid var(--rojo); overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-inner { display: flex; min-width: max-content; padding: 0 1rem; }
.filter-btn { background: none; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--gris); padding: 0.85rem 1.1rem; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.2s, border-color 0.2s; }
.filter-btn:hover { color: var(--rojo); }
.filter-btn.active { color: var(--rojo); border-bottom-color: var(--rojo); }

main { max-width: 900px; margin: 0 auto; padding: 2rem 1.2rem 5rem; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 1000px; } }

/* ACCORDION */
.cat-section { margin-bottom: 0.6rem; animation: fadeUp 0.4s ease both; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 10px var(--sombra); }

.cat-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 1rem 1.2rem; cursor: pointer;
  background: var(--blanco);
  border: 1.5px solid rgba(192,57,43,0.15);
  border-radius: 14px;
  transition: background 0.2s, border-color 0.2s;
  user-select: none;
}
.cat-header:hover { background: #fff5f5; border-color: rgba(192,57,43,0.35); }
.cat-header.open { border-radius: 14px 14px 0 0; border-color: var(--rojo); background: #fff5f5; }
.cat-header.open.verde { border-color: var(--verde); background: #f0faf4; }

.cat-emoji { width: 46px; height: 46px; border-radius: 12px; background: var(--rojo); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 3px 3px 0 var(--rojo-dk); flex-shrink: 0; }
.cat-emoji.verde { background: var(--verde); box-shadow: 3px 3px 0 #0f4023; }
.cat-title { font-family: 'Lobster', cursive; font-size: 1.6rem; color: var(--rojo); line-height: 1; flex: 1; }
.cat-title.verde { color: var(--verde); }
.cat-count { font-size: 0.75rem; font-weight: 700; color: var(--gris); background: var(--crema); padding: 0.2rem 0.6rem; border-radius: 999px; }
.cat-arrow { font-size: 1rem; color: var(--gris); transition: transform 0.3s; flex-shrink: 0; }
.cat-header.open .cat-arrow { transform: rotate(180deg); }

/* ACCORDION BODY */
.cat-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
  background: var(--blanco);
  border: 1.5px solid var(--rojo);
  border-top: none;
  border-radius: 0 0 14px 14px;
  padding: 0 1.2rem;
}
.cat-body.open { max-height: 1000px; padding: 1rem 1.2rem; }
.cat-body.verde { border-color: var(--verde); }

.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.6rem; margin-bottom: 0.2rem; }
.item-card { background: var(--blanco); border: 1.5px solid rgba(192,57,43,0.13); border-radius: 12px; padding: 0.9rem 1rem; display: flex; align-items: flex-start; gap: 0.6rem; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
.item-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--sombra); border-color: rgba(192,57,43,0.35); }
.item-card.special { border-color: rgba(26,107,58,0.3); background: #f0faf4; }
.item-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rojo); flex-shrink: 0; margin-top: 6px; }
.item-dot.verde { background: var(--verde); }
.item-name { font-size: 0.92rem; font-weight: 700; color: var(--texto); line-height: 1.3; }
.item-name.special { color: var(--verde); }
.item-sub { font-size: 0.78rem; color: var(--gris); margin-top: 0.2rem; }
.item-note { font-size: 0.8rem; color: var(--cafe); font-style: italic; margin-top: 0.6rem; font-weight: 600; }
.section-divider { display: none; }







@media (max-width: 480px) { .items-grid { grid-template-columns: 1fr 1fr; }  }

/* ── WHATSAPP POPUP ── */
#wa-float {
  position: fixed; bottom: 24px; right: 24px; z-index: 9000;
  display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
}
#wa-fab {
  width: 56px; height: 56px; border-radius: 50%;
  background: #25D366; border: none; cursor: pointer;
  box-shadow: 0 4px 16px rgba(37,211,102,0.45);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
#wa-fab:hover { transform: scale(1.1); box-shadow: 0 6px 22px rgba(37,211,102,0.55); }
#wa-popup {
  background: #fff; border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 1.2rem 1.4rem; width: 240px;
  display: none; flex-direction: column; gap: 0.8rem;
  animation: popIn 0.25s ease;
}
#wa-popup.open { display: flex; }
@keyframes popIn {
  from { opacity:0; transform: scale(0.9) translateY(10px); }
  to   { opacity:1; transform: scale(1)   translateY(0); }
}
.wa-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: #25D366; display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem; flex-shrink: 0;
}
.wa-header { display: flex; align-items: center; gap: 0.7rem; }
.wa-name   { font-weight: 800; font-size: 0.9rem; color: var(--texto); }
.wa-status { font-size: 0.72rem; color: #25D366; font-weight: 600; }
.wa-msg {
  background: #f0fdf4; border-radius: 10px;
  padding: 0.7rem 0.9rem; font-size: 0.85rem;
  color: var(--texto); line-height: 1.5;
}
.wa-btn {
  background: #25D366; color: white; border: none;
  border-radius: 8px; padding: 0.75rem;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem;
  cursor: pointer; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  transition: background 0.2s;
}
.wa-btn:hover { background: #1da851; }
</style>

<script>
function render() {
  const S = SITE;
  document.getElementById('h-nombre').textContent  = S.nombre;
  document.getElementById('h-tagline').textContent = S.tagline;
  document.getElementById('h-chips').innerHTML =
    `<span class="chip">🕐 ${S.horario}</span><span class="chip">📍 ${S.direccion.split(',')[0]}</span><span class="chip">📞 ${S.telefono}</span>`;
  
  document.getElementById('f-nombre').textContent = S.nombre;
  document.getElementById('f-info').textContent   = `📍 ${S.direccion} · 📞 ${S.telefono}`;

  document.getElementById('filter-inner').innerHTML =
    `<button class="filter-btn active" onclick="filterAll(this)">🍽️ Todo</button>` +
    S.categorias.map(c => `<button class="filter-btn" onclick="filterCat('${c.id}',this)">${c.emoji} ${c.nombre}</button>`).join('');

  document.getElementById('main-content').innerHTML = S.categorias.map((cat, idx) => `
    <div class="cat-section" id="cat-${cat.id}" style="animation-delay:${idx*0.05}s">
      <div class="cat-header ${cat.verde?'verde':''}" onclick="toggleCat('${cat.id}')">
        <div class="cat-emoji ${cat.verde?'verde':''}">${cat.emoji}</div>
        <h2 class="cat-title ${cat.verde?'verde':''}">${cat.nombre}</h2>
        <span class="cat-count">Ver opciones</span>
        <span class="cat-arrow">▼</span>
      </div>
      <div class="cat-body ${cat.verde?'verde':''}" id="body-${cat.id}">
        <div class="items-grid">
          ${cat.items.map(it => `
            <div class="item-card ${it.special?'special':''}">
              <div class="item-dot ${cat.verde?'verde':''}"></div>
              <div>
                <div class="item-name ${it.special?'special':''}">${it.special?'⭐ ':''}${it.n}</div>
                ${it.s ? `<div class="item-sub">${it.s}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
        ${cat.nota ? `<p class="item-note">${cat.nota}</p>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleCat(id) {
  const header = document.querySelector(`#cat-${id} .cat-header`);
  const body   = document.getElementById(`body-${id}`);
  const isOpen = body.classList.contains('open');
  header.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function filterAll(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => s.style.display = '');
  // Close all
  document.querySelectorAll('.cat-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('open'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterCat(id, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show all sections but open only the selected one
  document.querySelectorAll('.cat-section').forEach(s => s.style.display = '');
  document.querySelectorAll('.cat-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('open'));
  const header = document.querySelector(`#cat-${id} .cat-header`);
  const body   = document.getElementById(`body-${id}`);
  if (header && body) { header.classList.add('open'); body.classList.add('open'); }
  setTimeout(() => document.getElementById(`cat-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

render();
</script>
