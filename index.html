<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cocina de Mónica</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rojo:    #C0392B;
  --rojo-dk: #96281B;
  --verde:   #1A6B3A;
  --amarillo:#F0C040;
  --crema:   #FDF6EC;
  --cafe:    #6D4C2A;
  --blanco:  #FFFDF9;
  --gris:    #7F8C8D;
  --texto:   #2C1A0B;
  --sombra:  rgba(44,26,11,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--crema); color: var(--texto); overflow-x: hidden; }

header {
  background: linear-gradient(135deg, var(--rojo-dk) 0%, var(--rojo) 60%, #D4541A 100%);
  padding: 2.5rem 1.5rem 2rem; text-align: center; position: relative; overflow: hidden;
}
header::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(255,255,255,0.04) 18px, rgba(255,255,255,0.04) 36px);
}
.flag-stripe { display: flex; justify-content: center; gap: 4px; margin-bottom: 1rem; position: relative; }
.flag-stripe span { width: 44px; height: 5px; border-radius: 3px; }
.header-inner { position: relative; max-width: 700px; margin: 0 auto; }
.header-badge { display: inline-block; background: var(--amarillo); color: var(--cafe); font-weight: 800; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 1rem; border-radius: 999px; margin-bottom: 0.8rem; }
header h1 { font-family: 'Lobster', cursive; font-size: clamp(2.8rem, 9vw, 5.5rem); color: #fff; line-height: 1; text-shadow: 3px 3px 0 rgba(0,0,0,0.2); margin-bottom: 0.3rem; }
.header-tagline { color: rgba(255,255,255,0.85); font-size: 1rem; font-weight: 300; margin-bottom: 1.2rem; }
.header-chips { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
.chip { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }

.filter-bar { position: sticky; top: 0; z-index: 50; background: var(--blanco); border-bottom: 3px solid var(--rojo); overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-inner { display: flex; min-width: max-content; padding: 0 1rem; }
.filter-btn { background: none; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--gris); padding: 0.85rem 1.1rem; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.2s, border-color 0.2s; }
.filter-btn:hover { color: var(--rojo); }
.filter-btn.active { color: var(--rojo); border-bottom-color: var(--rojo); }

main { max-width: 900px; margin: 0 auto; padding: 2rem 1.2rem 5rem; }

.cat-section { margin-bottom: 2.5rem; scroll-margin-top: 55px; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

.cat-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
.cat-emoji { width: 50px; height: 50px; border-radius: 14px; background: var(--rojo); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; box-shadow: 3px 3px 0 var(--rojo-dk); flex-shrink: 0; }
.cat-emoji.verde { background: var(--verde); box-shadow: 3px 3px 0 #0f4023; }
.cat-title { font-family: 'Lobster', cursive; font-size: 1.8rem; color: var(--rojo); line-height: 1; }
.cat-title.verde { color: var(--verde); }

.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 0.7rem; }
.item-card { background: var(--blanco); border: 1.5px solid rgba(192,57,43,0.13); border-radius: 12px; padding: 0.9rem 1rem; display: flex; align-items: flex-start; gap: 0.6rem; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
.item-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--sombra); border-color: rgba(192,57,43,0.35); }
.item-card.special { border-color: rgba(26,107,58,0.3); background: #f0faf4; }
.item-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rojo); flex-shrink: 0; margin-top: 6px; }
.item-dot.verde { background: var(--verde); }
.item-name { font-size: 0.92rem; font-weight: 700; color: var(--texto); line-height: 1.3; }
.item-name.special { color: var(--verde); }
.item-sub { font-size: 0.78rem; color: var(--gris); margin-top: 0.2rem; }
.item-note { font-size: 0.8rem; color: var(--cafe); font-style: italic; margin-top: 0.6rem; font-weight: 600; }
.section-divider { border: none; border-top: 1px dashed rgba(192,57,43,0.2); margin: 2rem 0; }

#wa-btn { position: fixed; bottom: 80px; left: 20px; z-index: 900; background: #25D366; color: white; border: none; border-radius: 50px; padding: 11px 18px; font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(37,211,102,0.4); transition: all 0.2s; text-decoration: none; display: flex; align-items: center; gap: 7px; }
#wa-btn:hover { transform: translateY(-2px); }
#edit-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 900; background: var(--rojo); color: white; border: none; border-radius: 50px; padding: 11px 20px; font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(192,57,43,0.4); transition: all 0.2s; }
#edit-toggle:hover { background: var(--rojo-dk); transform: translateY(-2px); }

#editor { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 16px; }
#editor.open { display: flex; }
#editor-box { background: #fff; border-radius: 16px; width: 100%; max-width: 660px; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
#editor-box h2 { font-family: 'Lobster', cursive; font-size: 1.8rem; color: var(--rojo); margin-bottom: 4px; }
#editor-box .ed-sub { color: var(--gris); font-size: 0.88rem; margin-bottom: 20px; }
.ed-section { margin-bottom: 20px; }
.ed-section h3 { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--cafe); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--crema); }
.ed-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
.ed-row.full { grid-template-columns: 1fr; }
.ed-field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--gris); margin-bottom: 4px; }
.ed-field input, .ed-field textarea { width: 100%; background: var(--crema); border: 1.5px solid rgba(192,57,43,0.2); border-radius: 8px; padding: 8px 10px; color: var(--texto); font-family: 'Nunito', sans-serif; font-size: 0.92rem; outline: none; transition: border 0.2s; }
.ed-field input:focus, .ed-field textarea:focus { border-color: var(--rojo); }
.ed-btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.ed-btn { font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700; padding: 10px 22px; border-radius: 8px; cursor: pointer; border: none; transition: all 0.2s; }
.ed-btn.save { background: var(--rojo); color: white; }
.ed-btn.save:hover { background: var(--rojo-dk); }
.ed-btn.cancel { background: var(--crema); color: var(--gris); }

footer { background: var(--texto); color: rgba(255,255,255,0.6); text-align: center; padding: 2rem 1rem; font-size: 0.82rem; }
.footer-logo { font-family: 'Lobster', cursive; font-size: 1.6rem; color: var(--amarillo); display: block; margin-bottom: 0.3rem; }

#editor-box::-webkit-scrollbar { width: 4px; }
#editor-box::-webkit-scrollbar-thumb { background: var(--rojo); border-radius: 2px; }
@media (max-width: 480px) { .items-grid { grid-template-columns: 1fr 1fr; } .ed-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<script>
const SITE = {
  nombre:    "La Cocina de Mónica",
  tagline:   "Cocina Casera · Hecha con Amor",
  horario:   "Desayunos 9–12 · Comida 1–6 pm",
  direccion: "Paricutín 29, Pilares Águilas, CDMX",
  telefono:  "55 2683 4246",
  whatsapp:  "5526834246",
  instagram: "",
  facebook:  "",
  categorias: [
    { id:"huevos",      emoji:"🥚", nombre:"Huevos",
      items:[ {n:"A la mexicana",s:"jitomate, cebolla, chile"}, {n:"Con jamón"}, {n:"Con salchicha"} ] },
    { id:"omelettes",   emoji:"🍳", nombre:"Omelettes",
      items:[ {n:"Espinacas con queso",special:true}, {n:"Jamón y queso"}, {n:"Champiñones con queso"} ] },
    { id:"sandwich",    emoji:"🥪", nombre:"Sandwich",
      items:[ {n:"Queso panela"}, {n:"Jamón"}, {n:"Milanesa de pollo o bistec"} ] },
    { id:"tortas",      emoji:"🥖", nombre:"Tortas",
      items:[ {n:"Jamón"},{n:"Salchicha"},{n:"Pierna"},{n:"Pechuga asada"},{n:"Milanesa de pollo o bistec"} ] },
    { id:"tacos-dorados", emoji:"🌮", nombre:"Tacos Dorados & Flautas",
      items:[ {n:"Pollo"},{n:"Papa"},{n:"Queso"},{n:"Tinga de pollo"} ] },
    { id:"tostadas",    emoji:"🫓", nombre:"Tostadas",
      items:[ {n:"Tinga de pollo"},{n:"Pata"} ] },
    { id:"chilaquiles", emoji:"🍲", nombre:"Chilaquiles",
      items:[ {n:"Con huevo"},{n:"Con pollo"},{n:"Con carne asada"} ] },
    { id:"enchiladas",  emoji:"🫔", nombre:"Enchiladas & Enmoladas",
      items:[ {n:"Enchiladas verdes"},{n:"Enmoladas"} ] },
    { id:"tacos",       emoji:"🌯", nombre:"Tacos",
      items:[ {n:"Bistec"},{n:"Campechanos"},{n:"Chorizo"},{n:"Hígado encebollado"} ],
      nota:"✦ Todos incluyen opción: con papas o nopales" },
    { id:"antojitos",   emoji:"⭐", nombre:"Antojitos",
      items:[ {n:"Gorditas de chicharrón"},{n:"Quesadillas de queso"},{n:"Quesadillas de papa"},{n:"Quesadillas choriqueso"},{n:"Huaraches sencillos"},{n:"Huaraches con bistec o campechanos"} ] },
    { id:"burritos",    emoji:"🌯", nombre:"Burritos",
      items:[ {n:"Huevo con frijoles"},{n:"Bistec"},{n:"Pechuga"},{n:"Chorizo"},{n:"Choriqueso"} ] },
    { id:"bebidas",     emoji:"☕", nombre:"Bebidas", verde:true,
      items:[ {n:"Café de la olla",s:"receta tradicional"},{n:"Agua de sabor",s:"del día"} ] },
  ]
};
</script>

<header>
  <div class="flag-stripe">
    <span style="background:#1A6B3A"></span>
    <span style="background:#F2E8D0"></span>
    <span style="background:#C0392B"></span>
  </div>
  <div class="header-inner">
    <span class="header-badge">🍽️ Cocina Casera · CDMX</span>
    <h1 id="h-nombre"></h1>
    <p class="header-tagline" id="h-tagline"></p>
    <div class="header-chips" id="h-chips"></div>
  </div>
</header>

<div class="filter-bar"><div class="filter-inner" id="filter-inner"></div></div>

<main id="main-content"></main>

<footer>
  <span class="footer-logo" id="f-nombre"></span>
  <p id="f-info"></p>
  <p style="margin-top:0.5rem;font-size:0.78rem;opacity:0.5">¡Gracias por preferirnos! 🌮❤️</p>
</footer>

<a id="wa-btn" href="#" target="_blank">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  Pedir por WhatsApp
</a>

<button id="edit-toggle" onclick="openEditor()">✏️ Editar</button>

<div id="editor">
  <div id="editor-box">
    <h2>✏️ Editar Página</h2>
    <p class="ed-sub">Los cambios se aplican al instante.</p>
    <div class="ed-section">
      <h3>🏠 Negocio</h3>
      <div class="ed-row">
        <div class="ed-field"><label>Nombre</label><input id="ed-nombre"></div>
        <div class="ed-field"><label>Tagline</label><input id="ed-tagline"></div>
      </div>
      <div class="ed-row">
        <div class="ed-field"><label>Horario</label><input id="ed-horario"></div>
        <div class="ed-field"><label>Teléfono</label><input id="ed-telefono"></div>
      </div>
      <div class="ed-row full">
        <div class="ed-field"><label>Dirección</label><input id="ed-direccion"></div>
      </div>
      <div class="ed-row">
        <div class="ed-field"><label>WhatsApp (solo números)</label><input id="ed-whatsapp"></div>
        <div class="ed-field"><label>Instagram</label><input id="ed-instagram"></div>
      </div>
    </div>
    <div class="ed-btn-row">
      <button class="ed-btn cancel" onclick="closeEditor()">Cancelar</button>
      <button class="ed-btn save" onclick="saveAndRender()">✓ Guardar</button>
    </div>
  </div>
</div>

<script>
function render() {
  const S = SITE;
  document.getElementById('h-nombre').textContent  = S.nombre;
  document.getElementById('h-tagline').textContent = S.tagline;
  document.getElementById('h-chips').innerHTML =
    `<span class="chip">🕐 ${S.horario}</span><span class="chip">📍 ${S.direccion.split(',')[0]}</span><span class="chip">📞 ${S.telefono}</span>`;
  document.getElementById('wa-btn').href = `https://wa.me/${S.whatsapp}?text=Hola!%20Quiero%20hacer%20un%20pedido%20😊`;
  document.getElementById('f-nombre').textContent = S.nombre;
  document.getElementById('f-info').textContent   = `📍 ${S.direccion} · 📞 ${S.telefono}`;

  document.getElementById('filter-inner').innerHTML =
    `<button class="filter-btn active" onclick="filterAll(this)">🍽️ Todo</button>` +
    S.categorias.map(c => `<button class="filter-btn" onclick="filterCat('${c.id}',this)">${c.emoji} ${c.nombre}</button>`).join('');

  document.getElementById('main-content').innerHTML = S.categorias.map((cat, idx) => `
    <div class="cat-section" id="cat-${cat.id}" style="animation-delay:${idx*0.05}s">
      <div class="cat-header">
        <div class="cat-emoji ${cat.verde?'verde':''}">${cat.emoji}</div>
        <h2 class="cat-title ${cat.verde?'verde':''}">${cat.nombre}</h2>
      </div>
      <div class="items-grid">
        ${cat.items.map(it => `
          <div class="item-card ${it.special?'special':''}">
            <div class="item-dot ${cat.verde?'verde':''}"></div>
            <div>
              <div class="item-name ${it.special?'special':''}">${it.special?'⭐ ':''}${it.n}</div>
              ${it.s ? `<div class="item-sub">${it.s}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
      ${cat.nota ? `<p class="item-note">${cat.nota}</p>` : ''}
    </div>
    ${idx < S.categorias.length-1 ? '<hr class="section-divider">' : ''}
  `).join('');
}

function filterAll(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => s.style.display = '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterCat(id, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => s.style.display = s.id === `cat-${id}` ? '' : 'none');
  setTimeout(() => document.getElementById(`cat-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

function openEditor() {
  const _u = atob('bW9uaWNh');
  const _p = atob('TU9OSUMkMjAyNg==');
  const user = prompt('👤 Usuario:');
  if (user === null) return;
  const pwd = prompt('🔐 Contraseña:');
  if (pwd === null) return;
  if (user !== _u || pwd !== _p) { alert('Usuario o contraseña incorrectos ❌'); return; }
  const S = SITE;
  document.getElementById('ed-nombre').value    = S.nombre;
  document.getElementById('ed-tagline').value   = S.tagline;
  document.getElementById('ed-horario').value   = S.horario;
  document.getElementById('ed-telefono').value  = S.telefono;
  document.getElementById('ed-direccion').value = S.direccion;
  document.getElementById('ed-whatsapp').value  = S.whatsapp;
  document.getElementById('ed-instagram').value = S.instagram;
  document.getElementById('editor').classList.add('open');
}

function closeEditor() { document.getElementById('editor').classList.remove('open'); }

function saveAndRender() {
  SITE.nombre    = document.getElementById('ed-nombre').value;
  SITE.tagline   = document.getElementById('ed-tagline').value;
  SITE.horario   = document.getElementById('ed-horario').value;
  SITE.telefono  = document.getElementById('ed-telefono').value;
  SITE.direccion = document.getElementById('ed-direccion').value;
  SITE.whatsapp  = document.getElementById('ed-whatsapp').value;
  SITE.instagram = document.getElementById('ed-instagram').value;
  closeEditor();
  render();
}

document.getElementById('editor').addEventListener('click', function(e) { if(e.target===this) closeEditor(); });
render();
</script>
</body>
</html>
